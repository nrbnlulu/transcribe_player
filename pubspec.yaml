name: transcribe_player
description: "A new Flutter project."
publish_to: "none"

version: 0.0.1+1

environment:
    sdk: ^3.11.0

dependencies:
    flutter:
        sdk: flutter

    cupertino_icons: ^1.0.8

    media_kit: ^1.2.6
    media_kit_libs_audio: ^1.0.7
    file_picker: ^8.1.2
    audio_video_progress_bar: ^2.0.3

    # Path provider for file access
    path_provider: ^2.1.5

    # State management
    riverpod: ^3.2.1
    flutter_riverpod: ^3.2.1
    flutter_hooks: ^0.21.3+1
    hooks_riverpod: ^3.2.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0
    flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/icon.jpg"

flutter:
    uses-material-design: true
